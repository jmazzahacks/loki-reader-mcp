# Nginx reverse proxy config for loki-reader-mcp (SSE transport)
# Drop this into your server block or include it from sites-enabled.
#
# Usage in Claude Code settings:
#   "url": "https://<server>/loki-mcp/sse"

location /loki-mcp/ {
    proxy_pass http://localhost:8000/;

    # Required for SSE streaming
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;

    # HTTP/1.1 with persistent connection
    proxy_http_version 1.1;
    proxy_set_header Connection '';

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE connections are long-lived
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
